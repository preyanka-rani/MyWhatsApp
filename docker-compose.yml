version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: whatsapp_postgres
    environment:
      POSTGRES_USER: whatsapp_user
      POSTGRES_PASSWORD: whatsapp_password
      POSTGRES_DB: whatsapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsapp_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whatsapp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: whatsapp_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: whatsapp_celery_worker
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
    command: celery -A app.workers.tasks worker --loglevel=info

  celery_beat:
    build: .
    container_name: whatsapp_celery_beat
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
    command: celery -A app.workers.tasks beat --loglevel=info

  flower:
    build: .
    container_name: whatsapp_flower
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - celery_worker
    command: celery -A app.workers.tasks flower --port=5555

volumes:
  postgres_data:
  redis_data:
